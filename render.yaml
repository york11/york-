services:
  - type: web
    name: personal-trading-center
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run 1.py --server.port $PORT --server.address 0.0.0.0
    plan: starter
    disk:
      name: stock-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
